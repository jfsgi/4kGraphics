<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4K Furniture Render Engine</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <header id="topbar">
        <div class="brand">
          <span class="logo">4K</span>
          <div>
            <h1>Furniture Render Engine</h1>
            <p id="status-line">Loading…</p>
          </div>
        </div>
        <div class="actions">
          <span id="build-tag" title="Engine build"></span>
          <button id="buildplan-btn" class="ghost">Build Plan</button>
          <button id="snapshot-btn" class="primary">Render 4K PNG</button>
        </div>
      </header>

      <aside id="left">
        <section>
          <h2>Catalog</h2>
          <div id="catalog" class="button-row"></div>
        </section>
        <section>
          <h2>Dimensions</h2>
          <div id="controls"></div>
        </section>
        <section>
          <h2>Import model</h2>
          <label class="drop-hint" id="import-label">
            <input type="file" id="import-input" accept=".glb,.gltf,.obj,.fbx,.stl" hidden />
            Click to choose a .glb / .gltf / .obj / .fbx / .stl file,<br />or drop it on the viewport.
          </label>
        </section>
      </aside>

      <main id="viewport"></main>

      <aside id="right">
        <section>
          <h2>Material</h2>
          <select id="part-select"></select>
          <div id="materials" class="swatch-grid"></div>
        </section>
        <section>
          <h2>Lighting</h2>
          <div id="lighting" class="button-row"></div>
        </section>
        <section>
          <h2>Scene</h2>
          <label class="field-row">
            <span>Background</span>
            <input type="color" id="bg-color" value="#22252a" />
          </label>
          <label class="field-row">
            <span>4K textures (4096²)</span>
            <input type="checkbox" id="ultra-toggle" checked />
          </label>
        </section>
      </aside>

      <div id="toast" hidden></div>

      <div id="modal" hidden>
        <div id="modal-card">
          <header>
            <h2 id="modal-title">Build Plan</h2>
            <div>
              <button id="plan-json" class="ghost">Download JSON</button>
              <button id="plan-print" class="ghost">Print</button>
              <button id="modal-close" class="ghost">Close</button>
            </div>
          </header>
          <div id="modal-body"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
